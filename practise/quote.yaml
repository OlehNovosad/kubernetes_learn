---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quote-service
  namespace: development
  labels:
    name: quote-service
spec:
  replicas: 2
  selector:
    matchLabels:
      name: quote-service
  template:
    metadata:
      labels:
        name: quote-service
    spec:
      containers:
        - name: quote-service-container
          image: datawire/quote:0.5.0
          ports:
            - containerPort: 8080
